<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="detalleProducto.css">
    <link rel="icon" href="Images/icons/QuarryMusic.png" type="image/png">
    <title id="page-title">Cargando Producto...</title>
</head>
<body>
    <nav class="nav-simple">
        <a href="index.html">← Volver a la tienda</a>
    </nav>

    <main class="contenedor-producto">
        <div class="producto-visual">
            <img id="p-imagen" src="" alt="" class="img-principal">
        </div>

        <div class="producto-info">
            <span id="p-tag" class="product-tag"></span>
            <h1 id="p-titulo"></h1>
            <p id="p-precio" class="precio-detalle"></p>
            
            <div class="seleccion-cantidad">
                <label>Cantidad:</label>
                <input type="number" value="1" min="1" class="input-cantidad">
            </div>

            <div class="acciones-compra">
                <button class="btn-carrito">AGREGAR AL CARRITO</button>
                <button class="btn-comprar">COMPRAR AHORA</button>
            </div>

            <div class="descripcion">
                <h3>Descripción</h3>
                <div id="p-descripcion"></div>
            </div>

            <div id="p-lista-tracks" class="previa-musical">
                </div>
        </div>
    </main>

    <script src="datos-productos.js"></script>
    <script>
        // 1. Obtener el ID de la URL (?id=nombre-disco)
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const info = productos[id];

        if (info) {
            // 2. Llenar los textos básicos
            document.title = info.titulo + " - Quarry Music";
            document.getElementById('p-titulo').innerText = info.titulo;
            document.getElementById('p-precio').innerText = info.precio;
            document.getElementById('p-tag').innerText = info.tag;
            document.getElementById('p-imagen').src = info.imagen;
            document.getElementById('p-descripcion').innerHTML = `<p>${info.descripcion}</p>`;

            // 3. Generar la lista de canciones
            const trackContainer = document.getElementById('p-lista-tracks');
            let htmlTracks = '<h3>¡Escucha algunos de los sencillos!</h3>';
            
            info.tracks.forEach(t => {
                htmlTracks += `
                    <div class="track">
                        <p>${t.num}. ${t.nombre}</p>
                        <audio controls controlsList="nodownload">
                            <source src="${t.file}" type="audio/mpeg">
                        </audio>
                    </div>`;
            });
            trackContainer.innerHTML = htmlTracks;

            // 4. Lógica de auto-pausa
            const audios = document.querySelectorAll('audio');
            audios.forEach(audio => {
                audio.addEventListener('play', () => {
                    audios.forEach(other => { if(other !== audio) other.pause(); });
                });
            });

        } else {
            document.body.innerHTML = "<h1>Producto no encontrado</h1><a href='index.html'>Volver</a>";
        }
    </script>
</body>
</html>
