<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="detalleProducto.css">
    <link rel="icon" href="Images/icons/QuarryMusic.png" type="image/png">
    <title>Cuenta - Quarry Music</title>
</head>
<body>
    <nav class="nav-simple">
        <a href="index.html">← Volver a la tienda</a>
    </nav>
    <main class="contenedor-producto" style="display: flex; justify-content: center;">
        <div class="producto-info" style="max-width: 400px; text-align: center;">
            <h1 class="titulo-detalle">¡Bienvenido!</h1>
            <p style="margin-bottom: 20px; color: #bbb;">Ingresa a tu cuenta de coleccionista</p>
            
            <div class="acciones-compra">
                <input type="email" placeholder="Correo electrónico" class="input-cantidad" style="width: 100%; margin: 0 0 10px 0;">
                <input type="password" placeholder="Contraseña" class="input-cantidad" style="width: 100%; margin: 0 0 20px 0;">
                <button class="btn-comprar">INICIAR SESIÓN</button>
                <button class="btn-carrito">CREAR CUENTA NUEVA</button>
            </div>
        </div>
    </main>
